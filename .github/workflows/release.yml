name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Release workflow smoke gate
        run: npm run smoke:release-workflow

      - name: Config parity and release parity gates
        run: npm test -- src/utils/tauriWindowConfig.test.ts src/utils/releaseParity.test.ts src/utils/releaseSmokeAuto.test.ts src/utils/installMacosScript.test.ts src/utils/macosReleaseSigning.test.ts src/utils/prepareTauriSigningKey.test.ts

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      # Tauri 2.x corrupts key decoding when TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set
      # to an empty string (Invalid symbol at ~offset 346). Only export a real password.
      - name: Export updater signing password
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT}" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
              printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/import-apple-certificate.sh

      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node scripts/prepare-apple-notarization.mjs

      - name: Compose release body
        id: release_body
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          {
            echo "body<<MARKDOWN_EOF"
            sed "s/{{VERSION}}/${VERSION}/g" .github/release-body.md
            echo "MARKDOWN_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          assetNamePattern: MarkdownPress_[version]_[arch][setup][ext]
          args: --bundles app,dmg

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Release workflow smoke gate
        run: npm run smoke:release-workflow

      - name: Config parity and release parity gates
        run: npm test -- src/utils/tauriWindowConfig.test.ts src/utils/releaseParity.test.ts src/utils/releaseSmokeAuto.test.ts src/utils/installMacosScript.test.ts src/utils/macosReleaseSigning.test.ts src/utils/prepareTauriSigningKey.test.ts

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      # Tauri 2.x corrupts key decoding when TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set
      # to an empty string (Invalid symbol at ~offset 346). Only export a real password.
      - name: Export updater signing password
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT}" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
              printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Compose release body
        id: release_body
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          {
            echo "body<<MARKDOWN_EOF"
            sed "s/{{VERSION}}/${VERSION}/g" .github/release-body.md
            echo "MARKDOWN_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          assetNamePattern: MarkdownPress_[version]_[arch][setup][ext]
          args: --bundles nsis
