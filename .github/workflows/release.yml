name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Release workflow smoke gate
        run: npm run smoke:release-workflow

      - name: Config parity and release parity gates
        run: npm test -- src/utils/tauriWindowConfig.test.ts src/utils/releaseParity.test.ts src/utils/releaseSmokeAuto.test.ts src/utils/installMacosScript.test.ts src/utils/macosReleaseSigning.test.ts

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/import-apple-certificate.sh

      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node scripts/prepare-apple-notarization.mjs

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY || '-' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: |
            See the assets to download this version and install.

            ### 0.9.11

            #### 修复与改进

            - 保存与切换：切标签 / 切知识库 / 重命名移动前自动落盘脏内容；预览-only 文件禁止发布与导出。
            - 撤销：按标签缓存编辑器状态，跨标签切换后撤销历史可用。
            - 监听：覆盖所有打开标签的外部修改与删除，避免后台标签不同步。
            - 搜索与跳转：侧栏搜索跳转排队；预览模式下打开查找自动切到分屏。
            - 附件清理：补齐跨平台快捷键、侧栏入口与确认框。
            - UI 缩放：显示缩放百分比提示；编辑器与预览随 UI 缩放同步；支持 Cmd/Ctrl+Shift+0 重置。
            - 侧边栏：当前文件选中态更明显。
            - 预览与导出：收紧标题字号；长文档图片预览减少卡顿；工具栏暴露纯文本导出。
            - 发布：simple-blog 远端成功后再写本地发布状态；AI Apply 避免覆盖审阅中的编辑。

            ### macOS 安装说明

            **推荐：一键安装**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Yunz93/markdown-press/main/scripts/install-macos.sh | bash
            ```

            脚本会自动下载对应架构的 `.dmg`、移除隔离标记并安装到「应用程序」。

            已配置 Apple 开发者证书与公证凭据的 Release 也可直接拖入 Applications 打开。若仍提示无法验证开发者，请执行：

            ```
            xattr -cr /Applications/M記.app
            ```

            > 若应用仍在 Downloads 文件夹，请改用：
            > ```
            > xattr -cr ~/Downloads/M記.app
            > ```

            ### Windows 安装说明

            下载 `.exe` 安装程序，双击运行即可。如果 Windows SmartScreen 拦截，点击"更多信息" → "仍要运行"。
          releaseDraft: false
          prerelease: false
          assetNamePattern: MarkdownPress_[version]_[arch][setup][ext]
          args: --bundles app,dmg

