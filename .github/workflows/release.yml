name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ steps.prepare_signing_key.outputs.private_key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: |
            See the assets to download this version and install.

            ### macOS 安装说明

            由于本应用未经 Apple 签名公证，macOS 可能会提示"已损坏"或"无法验证开发者"。请按以下步骤操作：

            1. 下载 `.dmg` 文件并将应用拖入 Applications 文件夹
            2. 打开终端（Terminal），执行以下命令：
               ```
               xattr -cr /Applications/M記.app
               ```
            3. 再次双击打开应用即可

            > 如果你通过浏览器下载到 Downloads 文件夹但还未移动，请先运行：
            > ```
            > xattr -cr ~/Downloads/M記.app
            > ```

            ### Windows 安装说明

            下载 `.exe` 安装程序，双击运行即可。如果 Windows SmartScreen 拦截，点击"更多信息" → "仍要运行"。
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: MarkdownPress_[version]_[arch][ext]
          args: --bundles app,dmg

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ steps.prepare_signing_key.outputs.private_key_path }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: |
            See the assets to download this version and install.

            ### macOS 安装说明

            由于本应用未经 Apple 签名公证，macOS 可能会提示"已损坏"或"无法验证开发者"。请按以下步骤操作：

            1. 下载 `.dmg` 文件并将应用拖入 Applications 文件夹
            2. 打开终端（Terminal），执行以下命令：
               ```
               xattr -cr /Applications/M記.app
               ```
            3. 再次双击打开应用即可

            > 如果你通过浏览器下载到 Downloads 文件夹但还未移动，请先运行：
            > ```
            > xattr -cr ~/Downloads/M記.app
            > ```

            ### Windows 安装说明

            下载 `.exe` 安装程序，双击运行即可。如果 Windows SmartScreen 拦截，点击"更多信息" → "仍要运行"。
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: MarkdownPress_[version]_[arch][ext]
          args: --bundles nsis
