name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Release workflow smoke gate
        run: npm run smoke:release-workflow

      - name: Config parity and release parity gates
        run: npm test -- src/utils/tauriWindowConfig.test.ts src/utils/releaseParity.test.ts src/utils/releaseSmokeAuto.test.ts src/utils/installMacosScript.test.ts src/utils/macosReleaseSigning.test.ts

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/import-apple-certificate.sh

      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node scripts/prepare-apple-notarization.mjs

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY || '-' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: |
            See the assets to download this version and install.

            ### 0.9.6

            #### 新功能

            - macOS：一键安装脚本，自动下载 Release、移除隔离标记并安装到「应用程序」。
            - macOS：Release 工作流支持 Developer ID 签名与 Apple 公证（配置 GitHub Secrets 后生效）。
            - Mermaid：流程图、时序图等常用图表优先使用 beautiful-mermaid 渲染。

            #### 修复与改进

            - 自动保存：修复「设置 → 编辑器 → 自动保存间隔」不生效的问题（此前被硬编码为 500ms）。
            - 编辑/预览：加固正式包语法高亮、编辑器/预览一致性及多项代码审查修复。
            - 预览：多值 frontmatter 字段在预览中显示为横向标签。
            - 导出：长图分享样式与附件图片修复；防止栅格化卡死阻塞分享对话框。
            - 发布：公众号对话框布局优化；外链保留；样式预设同步到博客/公众号发布。
            - 工程：大规模模块拆分；新增 Release 冒烟测试与正式包一致性门禁。

            ### 0.9.5

            #### 新功能

            - AI：新增 DeepSeek 提供商，API Key 通过 Tauri 安全存储。

            #### 修复与改进

            - 列表编辑：多级有序列表与 CommonMark 对齐（空行重置计数、Backspace 即时规范化、延续段缩进、Tab 嵌套与 marker 继承等）。
            - 列表编辑：Tab 父级查找修正；软换行悬挂缩进兼容 CJK 字体。
            - 预览：支持 alpha/roman 有序列表（A./a./II./iv.）；indented code block 内标记不再误改写。
            - 预览：编辑中间态列表行不再误解析为 setext 标题；本地相对链接在应用内打开。
            - 预览/导出：嵌套列表边框与间距优化。
            - 保存时有序列表紧凑标记规范化；AI 设置持久化修复。

            ### 0.9.4

            #### 新功能

            - 长图导出与分享流程。
            - 侧边栏与回收站按扩展名显示文件类型图标。

            #### 修复与改进

            - 有序列表：保留序号样式、小数点起始编号、延续段与回归测试加固。
            - KaTeX 块级公式扫描与 Mermaid 样式注入优化。
            - 公众号发布：文章链接来源与超时提示本地化。
            - 磁盘变更与保存：已保存内容基线、有未保存编辑时不再静默覆盖并提示；手动保存仅在成功时提示；自动保存成功后再同步编辑区与本地备份草稿。
            - Frontmatter 时间戳刷新时减轻滚动与焦点跳动；空 YAML frontmatter 解析为 null。
            - 日期修改时间与创建时间、YAML 引号对齐等编辑体验修复。
            - 移除导出中的删除线模式选项。

            ### 0.9.3

            #### 修复与改进

            - 有序列表：列表项下缩进延续段不再错误打断编号；在延续段末尾按 Enter 会正确插入下一序号。
            - 宽松模式下预览保留源码中的序号显示；切换宽松/严格编号后编辑区与预览即时生效，无需重开文件。
            - 精简有序列表标准化逻辑，移除易与延续段落冲突的旧 fallback。

            ### 0.9.2

            #### 改进

            - 优化长文档场景下的编辑与预览更新性能，减少卡顿。
            - 正式包默认关闭 WebView 开发者工具；本地开发请继续使用 `npm run tauri:dev`（会通过合并配置启用调试）。
            - 博客/公众号发布相关的服务端调试日志改为写入应用配置目录下的 `publish-debug.log`，便于在 Windows 与多用户环境下排查（不再依赖 Unix `/tmp`）。

            #### 修复

            - 从外部打开 Markdown 时在新窗口中加载。
            - 视图切换、分屏滚动同步、主题切换与编辑稳定性多项修复。
            - macOS 叠加标题栏与 PDF 导出相关修复。
            - 侧边栏右键菜单在靠近屏幕边缘时自动收敛到视口内。
            - 预览 Wiki 嵌入、PDF 导出中的图片及渲染链路加固。
            - KaTeX MathML 输出与 Tauri 主题同步等问题修复。

            ### macOS 安装说明

            **推荐：一键安装**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Yunz93/markdown-press/main/scripts/install-macos.sh | bash
            ```

            脚本会自动下载对应架构的 `.dmg`、移除隔离标记并安装到「应用程序」。

            已配置 Apple 开发者证书与公证凭据的 Release 也可直接拖入 Applications 打开。若仍提示无法验证开发者，请执行：

            ```
            xattr -cr /Applications/M記.app
            ```

            > 若应用仍在 Downloads 文件夹，请改用：
            > ```
            > xattr -cr ~/Downloads/M記.app
            > ```

            ### Windows 安装说明

            下载 `.exe` 安装程序，双击运行即可。如果 Windows SmartScreen 拦截，点击"更多信息" → "仍要运行"。
          releaseDraft: false
          prerelease: false
          assetNamePattern: MarkdownPress_[version]_[arch][setup][ext]
          args: --bundles app,dmg

