      - name: Config parity and release parity gates
        run: npm test -- src/utils/tauriWindowConfig.test.ts src/utils/releaseParity.test.ts src/utils/releaseSmokeAuto.test.ts src/utils/installMacosScript.test.ts src/utils/macosReleaseSigning.test.ts src/utils/prepareTauriSigningKey.test.ts

      - name: Sync app version from Git tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run release:sync-version

      - name: Prepare updater signing key
        id: prepare_signing_key
        env:
          TAURI_SIGNING_PRIVATE_KEY_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-tauri-signing-key.mjs

      # Tauri 2.x corrupts key decoding when TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set
      # to an empty string (Invalid symbol at ~offset 346). Only export a real password.
      - name: Export updater signing password
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT}" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
              printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_INPUT}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseBody: |
            See the assets to download this version and install.

            ### 0.9.16

            #### 新功能与改进

            - 编辑器：新增 Minimal / Things / Catppuccin / Solarized 等 Obsidian 主流 Markdown 样式预设（编辑区与预览同步）。
            - Windows 应用内更新：本版本仍暂不生成 `latest.json`（与 0.9.15 相同限制）。

            ### macOS 安装说明

            **推荐：一键安装**

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Yunz93/markdown-press/main/scripts/install-macos.sh | bash
            ```

            脚本会自动下载对应架构的 `.dmg`、移除隔离标记并安装到「应用程序」。

            已配置 Apple 开发者证书与公证凭据的 Release 也可直接拖入 Applications 打开。若仍提示无法验证开发者，请执行：

            ```
            xattr -cr /Applications/M記.app
            ```

            > 若应用仍在 Downloads 文件夹，请改用：
            > ```
            > xattr -cr ~/Downloads/M記.app
            > ```

            ### Windows 安装说明

            下载 `.exe` 安装程序，双击运行即可。如果 Windows SmartScreen 拦截，点击"更多信息" → "仍要运行"。
          releaseDraft: false
          prerelease: false
          assetNamePattern: MarkdownPress_[version]_[arch][setup][ext]
          args: --bundles nsis
