<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Markdown Press</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { margin-bottom: 1rem; }
    p { color: #888; margin-bottom: 2rem; }
    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 8px;
    }
    button:hover { opacity: 0.9; }
    .secondary {
      background: transparent;
      color: #fff;
      border: 1px solid #444;
    }
    #status {
      margin-top: 1rem;
      color: #4caf50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗑️ Reset Markdown Press</h1>
    <p>Clear all saved settings and knowledge base history</p>
    <div>
      <button onclick="resetAndGo()">Reset & Go to App</button>
      <button class="secondary" onclick="goToApp()">Just Go to App</button>
    </div>
    <p id="status"></p>
  </div>
  <script>
    function resetAndGo() {
      localStorage.clear();
      document.getElementById('status').textContent = '✓ Reset complete! Redirecting...';
      setTimeout(() => {
        window.location.href = '/';
      }, 500);
    }
    function goToApp() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
